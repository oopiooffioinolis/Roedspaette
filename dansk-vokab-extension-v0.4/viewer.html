<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dansk Vokab reader</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="bar">
    <div class="flag" aria-hidden="true"></div>
    <button id="hl" title="Highlight the Danish words you've already saved">Highlight known words</button>
    <span id="title"></span>
    <span id="status"></span>
  </div>
  <div id="pages"></div>
  <div id="error" hidden></div>

  <div id="pop">
    <div class="word" id="pop-word"></div>
    <div class="set" id="pop-set"></div>
    <label for="pop-tr">Translation</label>
    <input type="text" id="pop-tr" autocomplete="off" autocapitalize="none">
    <div class="row">
      <button id="pop-close">Close</button>
      <button class="primary" id="pop-save">Save translation</button>
    </div>
    <div class="msg" id="pop-msg"></div>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
