<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dansk Vokab reader</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="bar">
    <div class="flag" aria-hidden="true"></div>
    <button id="hl" title="Highlight the Danish words you've already saved">Highlight known words</button>
    <span id="title"></span>
    <span id="status"></span>
  </div>
  <div id="pages"></div>
  <div id="error" hidden></div>
  <div id="pick" hidden>
    <p class="pick-lead" id="pick-lead">Open a PDF to read it here.</p>
    <p class="pick-name" id="pick-name"></p>
    <button id="pick-btn">Choose the PDF…</button>
    <input type="file" id="pick-input" accept="application/pdf,.pdf" hidden>
    <p class="pick-note">Chrome doesn't let extensions read local files on their own, so pick it once here. It opens instantly and highlighting works. (Web PDFs open automatically.)</p>
  </div>

  <div id="pop">
    <div class="pop-hd">
      <div class="word" id="pop-word"></div>
      <button id="pop-x" title="Close" aria-label="Close">✕</button>
    </div>
    <input type="text" id="pop-tr" autocomplete="off" autocapitalize="none" placeholder="add a translation…">
    <div class="msg" id="pop-msg"></div>
    <div class="pop-meta"><span id="pop-set"></span><span>Enter saves · Esc closes</span></div>
  </div>

  <button id="savebar" hidden>＋ Save to vocab</button>

  <div id="cap" hidden>
    <div class="cap-top"><span class="cap-flag" aria-hidden="true"></span><span class="cap-brand">Dansk Vokab</span><button id="cap-x" title="Close">✕</button></div>
    <label for="cap-term">Word / phrase</label>
    <input id="cap-term" type="text" autocomplete="off" autocapitalize="none">
    <label for="cap-tr">Translation — Enter saves</label>
    <input id="cap-tr" type="text" autocomplete="off" autocapitalize="none" placeholder="translating…">
    <label for="cap-set">Save to set</label>
    <select id="cap-set"></select>
    <label for="cap-note">Note (optional)</label>
    <input id="cap-note" type="text" autocomplete="off">
    <div class="cap-actions"><span class="msg" id="cap-msg"></span><button id="cap-cancel">Cancel</button><button class="primary" id="cap-save">Save</button></div>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
